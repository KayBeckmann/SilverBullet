# Lokal testen: docker compose up
# Port 3000 direkt erreichbar unter http://localhost:3000
# Diese Datei wird von Docker Compose automatisch eingelesen.

services:
  app:
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      SB_PASS: localtest

  syncer:
    environment:
      SYNC_INTERVAL: "300"   # alle 5 min beim Testen
